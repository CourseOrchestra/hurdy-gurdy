## Reproducer from https://github.com/OpenAPITools/openapi-generator/issues/23988:
## ItemArray is an "alias" — a named component schema that is a plain array.
## openapi-generator (spring, generateAliasAsModel=true) emits
## `private ItemArray itemArray = new ArrayList<>();` which does not compile.
openapi: 3.0.1
info:
  title: Test
  version: 0.0.1
paths: {}

components:
  schemas:
    Item:
      type: object
      properties:
        property:
          type: string
    ItemArray:
      type: array
      items:
        $ref: '#/components/schemas/Item'
    MyObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        itemArray:
          $ref: '#/components/schemas/ItemArray'
