# OpenAPI 3.1.0 companion to roundtrip.yaml, isolated here because `type: 'null'`
# is 3.1-only syntax and swagger-parser stops resolving allOf/ComposedSchema
# under 3.1.0 (so no inheritance shapes live here — only flat objects).
#
# Exercises the generator's ONLY anyOf support: nullable-unwrap. A property
# `anyOf: [X, {type: 'null'}]` must generate the plain non-null element type of
# X (nullable String / nullable Inner), and both a populated value and an
# explicit null must round-trip through Jackson.
openapi: 3.1.0
info: {title: roundtrip31, version: "1.0"}
paths: {}
components:
  schemas:
    Inner:
      type: object
      required: [inner_name]
      properties:
        inner_name:
          type: string
        inner_count:
          type: integer

    NullableHolder:
      type: object
      required: [id]
      properties:
        id:
          type: string
        # anyOf nullable-unwrap -> nullable String
        nick:
          anyOf:
            - type: string
            - type: 'null'
        # anyOf nullable-unwrap -> nullable Inner
        alt_inner:
          anyOf:
            - $ref: '#/components/schemas/Inner'
            - type: 'null'

    # Self-referential (cyclic) tree schema: an Element references itself, both
    # as a nullable single self-reference (`next`, terminating a chain) and as a
    # list of self-references (`children`, a tree/forest). Exercises the
    # generator's self-`$ref` resolution (a `$ref` to the declaring schema stays
    # a ClassName, not inlined -> `record Element(String, Element, List<Element>)`)
    # and the round-trip test's reflective factory (which must detect the cycle
    # to avoid infinite recursion).
    Element:
      type: object
      required: [label]
      properties:
        label:
          type: string
        # nullable self-reference (element | null) — terminates a chain
        next:
          anyOf:
            - $ref: '#/components/schemas/Element'
            - type: 'null'
        # list of self-references — a tree/forest of children
        children:
          type: array
          items:
            $ref: '#/components/schemas/Element'
