openapi: 3.0.1
info:
  title: "PR233 inheritance example"
  description: |
    The exact schema the maintainer posted on
    https://github.com/CourseOrchestra/hurdy-gurdy/pull/233 to show that a root
    class property inherited by an otherwise-empty leaf produced non-compiling
    Kotlin (leaf generated as `object`, inherited property not overridden).
  version: "0.1"
paths:
components:
  schemas:
    A:
      description: A
      properties:
        type:
          type: string
        description:
          type: string
          nullable: false
      discriminator:
        propertyName: type
        mapping:
          'b': '#/components/schemas/B'
          'c': '#/components/schemas/C'
    B:
      description: B
      allOf:
        - $ref: "#/components/schemas/A"
      properties:
        one_more:
          type: string
    C:
      description: C
      allOf:
        - $ref: "#/components/schemas/A"
