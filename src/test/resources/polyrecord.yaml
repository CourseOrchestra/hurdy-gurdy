openapi: 3.0.0
info: {title: polyrecord, version: "1.0"}
paths: {}
components:
  schemas:
    Animal:
      type: object
      required: [pet_type, name]
      discriminator:
        propertyName: pet_type
      properties:
        pet_type:
          type: string
        name:
          type: string
    Cat:
      allOf:
        - $ref: '#/components/schemas/Animal'
        - type: object
          required: [hunting_skill]
          properties:
            hunting_skill:
              type: string
    Dog:
      allOf:
        - $ref: '#/components/schemas/Animal'
        - type: object
          properties:
            pack_size:
              type: integer
    Shape:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
